            /* Signal strength levels */
            .signal-weak .signal-bar:nth-child(1) { background: #ff6b6b; }
            .signal-medium .signal-bar:nth-child(1),
            .signal-medium .signal-bar:nth-child(2) { background: #ffd93d; }
            .signal-strong .signal-bar:nth-child(1),

            .signal-excellent .signal-bar:nth-child(1),
            .signal-excellent .signal-bar:nth-child(2),
            .signal-excellent .signal-bar:nth-child(3),
            .signal-excellent .signal-bar:nth-child(4) { background: #4dabf7; }

            /* Scan Button */
            .scan-button {

                font-size: 16px;

                margin-bottom: 24px;
                text-align: center;
            }

            .popup-input {
                width: 100%;
                padding: 12px 16px;
                border: 2px solid #e5e5e5;
                border-radius: 12px;
                font-family: 'DM Sans', sans-serif;
                font-size: 16px;
                margin-bottom: 24px;
                box-sizing: border-box;
            }

            .popup-input:focus {
                outline: none;
                border-color: #363636;
            }

            .popup-buttons {
                display: flex;
                gap: 12px;
            }

            .popup-button {
                flex: 1;
                padding: 12px 16px;
                border: none;
                border-radius: 12px;
                font-family: 'DM Sans', sans-serif;
                font-weight: 600;
                font-size: 16px;
                cursor: pointer;
            }

            .popup-button.cancel {
                background: #f5f5f5;
                color: #363636;
            }

            .popup-button.connect {
                background: #363636;
                color: white;
            }

            .popup-button:hover {
                opacity: 0.9;
            }

            .popup-button:disabled {
                background: #ccc;
                color: #999;
                cursor: not-allowed;
            }

            /* Debug Button */
            .debug-button {
                position: fixed;
                bottom: 20px;
                right: 20px;
                background: #ff6b6b;
                color: white;
                border: none;
                padding: 8px 12px;
                border-radius: 8px;
                font-size: 12px;
                cursor: pointer;
                z-index: 999;
            }

            .debug-popup {
                position: fixed;
                top: 10%;
                left: 5%;
                width: 90%;
                height: 70%;
                background: #1e1e1e;
                color: #fff;
                border-radius: 12px;
                padding: 20px;
                box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
                z-index: 1001;
                overflow: auto;
                font-family: monospace;
            }

            .debug-close {
                position: absolute;
                top: 10px;
                right: 15px;
                background: none;
                border: none;
                color: #fff;
                font-size: 20px;

            .loading-text {
                color: #6a6a6a;
                font-style: italic;
                text-align: center;
                padding: 20px;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <!-- Status Bar -->
            <div class="status-bar">
                <span class="status-time">EVsafe</span>
                <div class="status-icons">
                    <span>📶</span>
                    <span>📶</span>
                    <span>🔋</span>
                </div>
            </div>

            <!-- Logo -->
            <div class="logo">EVsafe</div>

            <!-- Heading -->
            <div class="heading">
                <h1>Thiết lập WiFi</h1>
                <h2>Chọn mạng WiFi để kết nối</h2>
            </div>

            <!-- Content -->
            <div class="content">
                <div id="wifiList">
                    <div class="loading-text">Nhấn "Quét WiFi" để tìm mạng</div>
                </div>
                <button class="scan-button" onclick="scanWifi()">Quét WiFi</button>
            </div>
        </div>

        <!-- WiFi Password Popup -->
        <div class="popup-overlay" id="wifiPopup">
            <div class="popup">
                <div class="popup-title" id="popupTitle">Kết nối WiFi</div>
                <div class="popup-subtitle" id="popupSubtitle">Nhập mật khẩu cho mạng</div>
                <input type="password" class="popup-input" id="wifiPassword" placeholder="Mật khẩu WiFi" />
                <div class="popup-buttons"></div>
                    <button class="popup-button cancel" onclick="closeWifiPopup()">Hủy</button>
                    <button class="popup-button connect" onclick="connectWifi()">Kết nối</button>
                </div>
            </div>
        </div>

        <!-- Debug Button -->
        <button class="debug-button" onclick="showDebugInfo()">Debug</button>
        
        <!-- Debug Popup -->
        <div class="debug-popup" id="debugPopup" style="display: none;">
            <button class="debug-close" onclick="hideDebugInfo()">&times;</button>
            <pre id="debugContent">Debug information will appear here...</pre>
        </div>

        <script>
            let wifiNetworks = []
            let selectedWifi = null
            let debugData = {}

            // Update debug info
            function updateDebugInfo(key, value) {
                debugData[key] = value
                debugData.timestamp = new Date().toLocaleString()
            }

            // Show debug popup
            function showDebugInfo() {
                document.getElementById('debugContent').textContent = JSON.stringify(debugData, null, 2)
                document.getElementById('debugPopup').style.display = 'block'
            }

            // Hide debug popup
            function hideDebugInfo() {
                document.getElementById('debugPopup').style.display = 'none'
            }

            // Scan for WiFi networks
            async function scanWifi() {
                const scanButton = document.querySelector('.scan-button')
                const wifiList = document.getElementById('wifiList')
                
                // Show scanning state
                scanButton.disabled = true
                scanButton.textContent = 'Đang quét...'
                wifiList.innerHTML = '<div class="loading-text">Đang tìm kiếm mạng WiFi...</div>'
                
                updateDebugInfo('scan_start', 'Bắt đầu quét WiFi')
                
                try {
                    const response = await fetch('/scan')
                    const data = await response.text()
                    
                    updateDebugInfo('scan_response', data)
                    
                    // Parse the response as text lines (no JSON handling)
                    if (data) {
                        const lines = data.split('\n').filter(line => line.trim())
                        wifiNetworks = lines.map(line => {
                            const parts = line.split(',')
                            return {
                                ssid: parts[0] || line,
                                rssi: parseInt(parts[1]) || -50,
                                encryption: parts[2] || 'open'
                            }
                        })
                        
                        updateDebugInfo('parsed_networks', wifiNetworks)
                        displayWifiNetworks()
                    } else {
                        wifiList.innerHTML = '<div class="loading-text">Không tìm thấy mạng WiFi. Hãy thử quét lại.</div>'
                        updateDebugInfo('scan_result', 'Không có dữ liệu')
                    }
                } catch (error) {
                    console.error('Scan failed:', error)
                    wifiList.innerHTML = '<div class="loading-text">Lỗi quét WiFi. Hãy thử quét lại.</div>'
                    updateDebugInfo('scan_error', error.toString())
                }
                
                // Reset button
                scanButton.disabled = false
                scanButton.textContent = 'Quét WiFi'
            }

            // Display WiFi networks
            function displayWifiNetworks() {
                const wifiList = document.getElementById('wifiList')
                
                if (wifiNetworks.length === 0) {
                    wifiList.innerHTML = '<div class="loading-text">Không tìm thấy mạng WiFi. Hãy thử quét lại.</div>'
                    return
                }

                wifiList.innerHTML = wifiNetworks.map(network => {
                    const signalStrength = getSignalStrength(network.rssi || -50)
                    const hasPassword = network.encryption !== 'open' && network.encryption !== 'none'
                    
                    return `
                        <div class="wifi-network" onclick="selectWifi('${network.ssid || network.name}', ${hasPassword})">
                            <div class="wifi-info">
                                <div class="signal-bars ${signalStrength}">
                                    <div class="signal-bar"></div>
                                    <div class="signal-bar"></div>
                                    <div class="signal-bar"></div>
                                    <div class="signal-bar"></div>
                                </div>
                                <span class="wifi-name">${network.ssid || network.name}</span>
                                <span class="wifi-security">${hasPassword ? '🔒' : ''}</span>
                            </div>
                        </div>
                    `
                }).join('')
            }

            // Get signal strength class
            function getSignalStrength(rssi) {
                if (rssi > -30) return 'signal-excellent'
                if (rssi > -50) return 'signal-strong'
                if (rssi > -70) return 'signal-medium'
                return 'signal-weak'
            }

            // Select WiFi network
            function selectWifi(ssid, hasPassword) {
                selectedWifi = wifiNetworks.find(network => (network.ssid || network.name) === ssid)
                selectedWifi.hasPassword = hasPassword
                
                updateDebugInfo('selected_wifi', selectedWifi)
                
                document.getElementById('popupTitle').textContent = `Kết nối tới ${ssid}`
                document.getElementById('popupSubtitle').textContent = hasPassword ? 'Nhập mật khẩu để kết nối' : 'Nhấn kết nối để tiếp tục'
                document.getElementById('wifiPassword').style.display = hasPassword ? 'block' : 'none'
                document.getElementById('wifiPassword').value = ''
                
                if (hasPassword) {
                    document.getElementById('wifiPassword').focus()
                }
                
                document.getElementById('wifiPopup').style.display = 'block'
            }

            // Close WiFi popup
            function closeWifiPopup() {
                document.getElementById('wifiPopup').style.display = 'none'
                selectedWifi = null
            }

            // Connect to WiFi
            async function connectWifi() {
                if (selectedWifi) {
                    const password = document.getElementById('wifiPassword').value
                    const networkName = selectedWifi.ssid || selectedWifi.name

                    if (selectedWifi.hasPassword && !password) {
                        alert('Vui lòng nhập mật khẩu WiFi')
                        return
                    }

                    // Show connecting status
                    document.getElementById('popupSubtitle').textContent = 'Đang kết nối...'
                    document.querySelector('.popup-button.connect').textContent = 'Đang kết nối...'
                    document.querySelector('.popup-button.connect').disabled = true

                    try {
                        // Send connect request to ESP32
                        const body = 'ssid=' + encodeURIComponent(networkName) + '&pass=' + encodeURIComponent(password)
                        const response = await fetch('/connect', {
                            method: 'POST',
                            headers: {'Content-Type': 'application/x-www-form-urlencoded;charset=UTF-8'},
                            body: body
                        })
                        
                        const result = await response.text()
                        document.getElementById('popupSubtitle').textContent = result
                        
                        updateDebugInfo('connect_response', result)
                        
                        // Poll connection status
                        for (let i = 0; i < 10; i++) {
                            await new Promise(resolve => setTimeout(resolve, 1000))
                            
                            try {
                                const statusResponse = await fetch('/status')
                                const status = await statusResponse.text()
                                
                                updateDebugInfo('status_check_' + i, status)
                                
                                if (status.indexOf('connected') >= 0) {
                                    document.getElementById('popupSubtitle').textContent = 'Kết nối thành công!'
                                    updateDebugInfo('connection_result', 'success')
                                    setTimeout(() => {
                                        closeWifiPopup()
                                        alert('Kết nối WiFi thành công!')
                                    }, 1500)
                                    return
                                }
                                
                                document.getElementById('popupSubtitle').textContent = `Đang thử kết nối... (${i + 1}/10)`
                            } catch (statusError) {
                                console.error('Status check failed:', statusError)
                                updateDebugInfo('status_error_' + i, statusError.toString())
                            }
                        }
                        
                        // If we get here, connection failed
                        document.getElementById('popupSubtitle').textContent = 'Kết nối thất bại. Vui lòng thử lại.'
                        updateDebugInfo('connection_result', 'failed - timeout')
                        
                    } catch (error) {
                        console.error('Connect failed:', error)
                        document.getElementById('popupSubtitle').textContent = 'Lỗi kết nối. Vui lòng thử lại.'
                        updateDebugInfo('connect_error', error.toString())
                    }
                    
                    // Reset button state
                    document.querySelector('.popup-button.connect').textContent = 'Kết nối'
                    document.querySelector('.popup-button.connect').disabled = false
                }
            }

            // Handle Enter key in password input
            document.addEventListener('DOMContentLoaded', function() {
                document.getElementById('wifiPassword').addEventListener('keypress', function(e) {
                    if (e.key === 'Enter') {
                        connectWifi()
                    }
                })
            })
        </script>
    </body>
</html>
)";
